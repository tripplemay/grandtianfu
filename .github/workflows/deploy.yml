# CI: 共享生产主机模型。push main -> build api+web 镜像 (GitHub runner 构建, 避 VPS OOM)
# -> 推 GHCR (ghcr.io/<owner>/grandtianfu/{api,web}) -> SSH 到 VPS 调 deploy.sh (只 pull/up)。
# VPS 永不构建。需 secrets: VPS_HOST / VPS_USER / VPS_SSH_KEY (占位, 后续手动配置)。
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}   # = tripplemay

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.sha.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: gitleaks secret scan
        continue-on-error: true   # 组织账号需 license; 不阻断 CI(密钥另有 GitHub 推送保护兜底)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: sha
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # api: 上下文 = repo 根 (含 packages/floorplan_core), file=apps/api/Dockerfile。
      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.sha.outputs.tag }}
          tags: |
            ghcr.io/${{ env.OWNER }}/grandtianfu/api:${{ steps.sha.outputs.tag }}
            ghcr.io/${{ env.OWNER }}/grandtianfu/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # web: 上下文 = repo 根, file=apps/web/Dockerfile (静态烤进 nginx:alpine, 无 target)。
      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.sha.outputs.tag }}
          tags: |
            ghcr.io/${{ env.OWNER }}/grandtianfu/web:${{ steps.sha.outputs.tag }}
            ghcr.io/${{ env.OWNER }}/grandtianfu/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy (VPS 只 pull/up, loopback 健康门禁)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/grandtianfu
            export TAG=${{ needs.build-and-push.outputs.tag }}
            ./scripts/deploy.sh
