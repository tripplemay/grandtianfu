# TLS 冷启动临时配置: 证书尚未签发前, nginx 不能带 443 ssl 块 (找不到证书会启动失败)。
# 本文件仅 80 端口 + 放行 ACME http-01 challenge, 供 init-letsencrypt.sh 首签使用。
# 签发成功后改用 grandtianfu.conf (含 443), 删除/停用本文件。
#
# 用法 (冷启动期, 与 grandtianfu.conf 互斥, 二选一挂载):
#   把本文件作为唯一 conf.d 站点 -> up nginx -> 跑 certbot webroot 签发 -> 切 grandtianfu.conf。
server {
    listen 80;
    server_name studio.example.com;

    # ACME http-01: certbot 把校验文件放到共享 webroot 卷, nginx 暴露之。
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 冷启动期其余路径占位 (尚无 TLS, 不跳转)。
    location / {
        return 200 "grandtianfu bootstrap: awaiting TLS issuance\n";
        add_header Content-Type text/plain;
    }
}
