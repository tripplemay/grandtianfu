# 阅天府 studio — 生产编排 (共享主机模型: 仅 api + web 两容器)。
# 宿主已有 nginx + certbot 接管 80/443 与 TLS; 本编排不抢端口、不跑 nginx/certbot。
# 两容器只映射到 127.0.0.1 loopback (api:8021 / web:8022), 由宿主 nginx vhost 反代。
# 镜像由 CI 按 git sha 打 tag 推 GHCR; VPS 全程只 pull, 永不构建。回滚 = 换 TAG。
name: grandtianfu

services:
  api:
    image: ghcr.io/${GHCR_OWNER}/grandtianfu/api:${TAG:-latest}
    restart: unless-stopped
    environment:
      DATA_DIR: /data/projects
      HOUSE: D
      GEOM_READONLY: "${GEOM_READONLY-}"   # 生产必须空=可写 (红线); 误置 1 由 /api/health readonly 字段告警
      # AI 子系统 (Phase 5): relay 凭据走 .env (不入仓, 权限 600)。
      # 缺 key/base -> ai_enabled=False, AI 端点 503, 主服务 (几何/渲染) 不受影响。
      OPENAI_BASE_URL: "${OPENAI_BASE_URL-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY-}"
      IMAGE_MODEL: "${IMAGE_MODEL:-gpt-image-2}"
      ARTIFACTS_DIR: /data/artifacts
      UPLOADS_DIR: /data/uploads
      AI_MAX_IMAGES_PER_PROJECT: "${AI_MAX_IMAGES_PER_PROJECT:-200}"
      AI_DAILY_IMAGE_CAP: "${AI_DAILY_IMAGE_CAP:-500}"
      HTTPS_PROXY: "${HTTPS_PROXY-}"        # 出网代理 (VPS 到 relay 需要时填; 直连留空)
      FAL_KEY: "${FAL_KEY-}"                # fal.ai 几何锁定实拍 (路线A; 缺则第7步回退 gpt-image-2)
    volumes:
      - /opt/grandtianfu/data/projects:/data/projects     # bind (chown 10001 / 备份对齐)
      - /opt/grandtianfu/data/artifacts:/data/artifacts   # AI 产物 (自托管 /api/artifacts; 持久+备份)
      - /opt/grandtianfu/data/uploads:/data/uploads        # 空房上传 (PIPL; 可删除; 须 chown 10001)
    ports:
      - "127.0.0.1:8021:8000"   # 仅 loopback; 宿主 nginx /api/ -> 127.0.0.1:8021
    mem_limit: 1g
    memswap_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: ghcr.io/${GHCR_OWNER}/grandtianfu/web:${TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8022:8080"   # 仅 loopback; 宿主 nginx / -> 127.0.0.1:8022
    mem_limit: 256m
