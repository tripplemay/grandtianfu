# 阅天府 studio — 生产编排 (共享主机模型: 仅 api + web 两容器)。
# 宿主已有 nginx + certbot 接管 80/443 与 TLS; 本编排不抢端口、不跑 nginx/certbot。
# 两容器只映射到 127.0.0.1 loopback (api:8021 / web:8022), 由宿主 nginx vhost 反代。
# 镜像由 CI 按 git sha 打 tag 推 GHCR; VPS 全程只 pull, 永不构建。回滚 = 换 TAG。
name: grandtianfu

services:
  api:
    image: ghcr.io/${GHCR_OWNER}/grandtianfu/api:${TAG:-latest}
    restart: unless-stopped
    environment:
      DATA_DIR: /data/projects
      HOUSE: D
      GEOM_READONLY: "${GEOM_READONLY-}"   # 生产必须空=可写 (红线); 误置 1 由 /api/health readonly 字段告警
    volumes:
      - /opt/grandtianfu/data/projects:/data/projects   # bind (chown 10001 / 备份对齐)
    ports:
      - "127.0.0.1:8021:8000"   # 仅 loopback; 宿主 nginx /api/ -> 127.0.0.1:8021
    mem_limit: 1g
    memswap_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: ghcr.io/${GHCR_OWNER}/grandtianfu/web:${TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8022:8080"   # 仅 loopback; 宿主 nginx / -> 127.0.0.1:8022
    mem_limit: 256m
