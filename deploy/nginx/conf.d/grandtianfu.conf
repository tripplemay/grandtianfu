# 阅天府 studio 正式站点 (80->443 跳转 + 443 TLS 站点)。
# 冷启动期请勿与 00-bootstrap.conf 同时启用 (二者都 listen 80 会 server_name 冲突);
# init-letsencrypt.sh 签发成功后, 把 00-bootstrap.conf 改名 .disabled, 再启用本文件。
#
# 对抗修正要点:
#   #18 add_header 继承陷阱: 每个含 add_header 的 location 都 include security-headers.conf。
#   #5  真 404: location / 用 try_files ... =404, 不再 200 兜底; CSP img-src 含 fbcdn。
#   #10 MVP 边缘拦 DELETE: /api/ 用 limit_except 只放 GET/POST/PUT/OPTIONS。
#   #20 探活放行: location = /api/health auth_basic off。

limit_req_zone  $binary_remote_addr zone=api_rl:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

server {                                   # 80 -> 跳 443, 放行 ACME 续期
    listen 80;
    server_name studio.example.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name studio.example.com;

    ssl_certificate     /etc/letsencrypt/live/studio.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studio.example.com/privkey.pem;
    include /etc/nginx/snippets/tls-params.conf;

    root /usr/share/nginx/html/current;     # current 软链 (web-static 原子发布)
    index index.html;
    client_max_body_size 15m;

    auth_basic "grandtianfu";
    auth_basic_user_file /etc/nginx/htpasswd;

    location = /api/health {                # 探活放行 (#20), 否则 401 误判 DOWN
        auth_basic off;
        proxy_pass http://api:8000;
    }

    location /api/ {                         # 同源, 保留 /api 前缀, 透传 no-store
        limit_req zone=api_rl burst=20 nodelay;
        limit_conn api_conn 20;
        limit_except GET POST PUT OPTIONS { deny all; }   # MVP 边缘拦 DELETE (#10)
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
        include /etc/nginx/snippets/security-headers.conf;   # #18 每 location 重复
    }

    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/snippets/security-headers.conf;   # #18
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri.html =404;      # #5 真 404, 不再 200 兜底
        add_header Cache-Control "no-store, must-revalidate";
        include /etc/nginx/snippets/security-headers.conf;   # #18
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
        include /etc/nginx/snippets/security-headers.conf;
    }
}
