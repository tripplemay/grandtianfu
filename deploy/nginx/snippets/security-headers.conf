# 安全响应头 (#5 #18 #19): 必须在每个含 add_header 的 location 内 include
# (nginx add_header 不向下继承: 子 location 一旦自带 add_header, 父级头全部丢失)。
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options nosniff always;
add_header X-Frame-Options SAMEORIGIN always;
add_header Referrer-Policy strict-origin-when-cross-origin always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://images.unsplash.com https://i.ibb.co https://scontent.fotp8-1.fna.fbcdn.net; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
