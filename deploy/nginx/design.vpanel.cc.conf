# 阅天府 studio — 宿主 nginx vhost (放到 /etc/nginx/sites-enabled/design.vpanel.cc.conf)。
# 共享生产主机模型: 宿主 nginx + certbot 已占 80/443, 本 vhost 只接入, 反代到
# loopback 容器 (api:127.0.0.1:8021 / web:127.0.0.1:8022)。范式照 astock/invoce。
#
# 前置条件 (宿主, 由运维一次性准备, 不在本仓):
#   - certbot 证书: /etc/letsencrypt/live/design.vpanel.cc/{fullchain,privkey}.pem
#       certbot --nginx -d design.vpanel.cc --email tripple@qq.com --agree-tos
#   - Basic 鉴权: /etc/nginx/auth/design.htpasswd
#       htpasswd -c /etc/nginx/auth/design.htpasswd <user>
#   - ACME webroot: /var/www/html
#
# 注: no-store / 长缓存由 api/web 容器自身响应头发 (web 镜像内 nginx 已设), 本 vhost 不强加缓存头。

# 80: ACME http-01 续期放行 + 其余 301 跳 443。
server {
    listen 80;
    listen [::]:80;
    server_name design.vpanel.cc;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# 443: TLS 站点 + Basic 鉴权 + 反代到 loopback 容器。
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name design.vpanel.cc;

    ssl_certificate     /etc/letsencrypt/live/design.vpanel.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/design.vpanel.cc/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;   # 已含 ssl_session_cache/timeout/protocols
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # TLS 优化 (方案#3, 安全部分): 会话缓存由上面 certbot 配置已开; 加 OCSP stapling 省去
    # 客户端握手期的 OCSP 往返。首次握手的 CPU 成本(实测 ~1.9s, 共享主机争抢)靠边缘 CDN
    # 卸载才是根治 (见方案#2)。resolver 仅用于 OCSP 域名解析 (proxy_pass 全是 127.0.0.1 无需)。
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    client_max_body_size 15m;

    # Basic 鉴权 (全站, 探活单独放行见下)。
    auth_basic "design.vpanel.cc";
    auth_basic_user_file /etc/nginx/auth/design.htpasswd;

    # 安全响应头 (server 级; 下方各 location 无 add_header, 故可继承)。
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # 探活放行 (绕 Basic, 否则 401 误判 DOWN); 保留 /api 前缀。
    location = /api/health {
        auth_basic off;
        proxy_pass http://127.0.0.1:8021;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 图片静态直出 (方案#1, 最大性能收益): 上传/产物已 bind-mount 到宿主, nginx 直读 +
    # sendfile 并行服务, 彻底绕开 Python 单 worker (原来每张图串行挤 uvicorn --workers 1)。
    # 目录内仅图片 (uploads=jpg/webp; artifacts=png/webp), 无 json/敏感文件; 防穿越由 nginx
    # 路径规范化保证。⚠ nginx 一旦在 location 内出现 add_header, server 级安全头即全部丢失,
    # 故此处必须重列全部安全头 + 缓存头。types 显式声明 -> webp 恒为 image/webp (不依赖宿主
    # mime.types 是否含 webp; 亦即在 nginx 层再修一遍「webp 被当 octet-stream」)。
    location ^~ /api/uploads/ {
        alias /opt/grandtianfu/data/uploads/;
        types { image/jpeg jpg jpeg; image/png png; image/webp webp; image/gif gif; }
        default_type application/octet-stream;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        open_file_cache max=4000 inactive=5m;
        open_file_cache_valid 2m;
        access_log off;
    }
    location ^~ /api/artifacts/ {
        alias /opt/grandtianfu/data/artifacts/;
        types { image/jpeg jpg jpeg; image/png png; image/webp webp; image/gif gif; }
        default_type application/octet-stream;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        open_file_cache max=4000 inactive=5m;
        open_file_cache_valid 2m;
        access_log off;
    }

    # API: 反代 api 容器, 保留 /api 前缀 (FastAPI 路由含 /api, proxy_pass 不带尾斜杠=不 strip)。
    # 注: 上面 ^~ /api/uploads/ 与 /api/artifacts/ 更具体且带 ^~, 图片请求不会落到这里。
    location /api/ {
        proxy_pass http://127.0.0.1:8021;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # 前端静态: 反代 web 容器 (镜像内 nginx 服 Next 静态导出, 自带缓存头)。
    location / {
        proxy_pass http://127.0.0.1:8022;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
