# 阅天府 web 镜像内置 nginx (仅服 Next 静态导出产物, listen 8080)。
# 不反代 /api: /api 由宿主 nginx 路由到 api 容器。缓存策略:
#   - /_next/static/*  内容指纹文件名 -> 长缓存 immutable
#   - 其余 (HTML / 未指纹的 img/font) -> no-store, 改版即时生效, 避免旧 chunk 错配
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 指纹化静态资源: 永久不可变缓存。
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA / 静态导出兜底: 优先精确文件, 再 <path>.html, 再目录 index, 最后回 index.html。
    # HTML 不缓存 (no-store), 保证发布新镜像后首屏即时刷新。
    location / {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri $uri.html $uri/index.html /index.html;
    }
}
