# Ruff config for the Python parts of this repo (apps/api + packages/floorplan_core).
# Run:  ruff format . && ruff check --fix .
# The api venv is Python 3.9 and the engine declares requires-python >=3.9.
target-version = "py39"
line-length = 100

extend-exclude = [
    ".venv",
    "apps/api/.venv",
    "packages/floorplan_core/.venv",
    "轴测图POC",        # legacy standalone POC, not part of the app
    "data",
    ".e2e-sandbox",
    ".phase0-baseline",
]

[lint]
# Conservative starting set for a previously-unlinted codebase:
# pyflakes (F), pycodestyle errors (E), import sorting (I).
select = ["E", "F", "I"]
ignore = ["E501"]  # line length is handled by `ruff format`, don't hard-error on it
